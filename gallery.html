<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LIFX Library - Gallery</title>
    <style>
        /* ============ FONT DARI FOLDER FONTS ============ */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('assets/fonts/cartoon-bold.woff2') format('woff2'),
                 url('assets/fonts/cartoon-bold.woff') format('woff'),
                 url('assets/fonts/cartoon-bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Quicksand';
            src: url('assets/fonts/Quicksand-Bold.woff2') format('woff2'),
                 url('assets/fonts/Quicksand-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MyCustomFont', 'Quicksand', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive;
            font-weight: bold;
            min-height: 100vh;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            overflow-x: hidden;
        }

        /* Loading Screen - Tema Ungu */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loading-screen.hide { opacity: 0; visibility: hidden; }
        .loading-spinner { 
            width: 70px; 
            height: 70px; 
            border: 5px solid rgba(255,255,255,0.3); 
            border-top: 5px solid white; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            margin-bottom: 20px; 
        }
        .loading-text { 
            font-size: 28px; 
            color: white; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.2); 
            letter-spacing: 2px; 
            display: flex; 
            gap: 5px; 
        }
        .loading-letter { 
            display: inline-block; 
            animation: bounceLetter 0.5s ease infinite; 
        }
        .loading-letter:nth-child(1) { animation-delay: 0s; }
        .loading-letter:nth-child(2) { animation-delay: 0.1s; }
        .loading-letter:nth-child(3) { animation-delay: 0.2s; }
        .loading-letter:nth-child(4) { animation-delay: 0.3s; }
        .loading-letter:nth-child(5) { animation-delay: 0.4s; }
        .loading-letter:nth-child(6) { animation-delay: 0.5s; }
        .loading-letter:nth-child(7) { animation-delay: 0.6s; }
        .loading-letter:nth-child(8) { animation-delay: 0.7s; }
        .loading-letter:nth-child(9) { animation-delay: 0.8s; }
        .loading-letter:nth-child(10) { animation-delay: 0.9s; }
        .loading-letter:nth-child(11) { animation-delay: 1.0s; }
        .loading-letter:nth-child(12) { animation-delay: 1.1s; }
        @keyframes bounceLetter { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            text-align: center; 
            color: white; 
            margin-bottom: 10px; 
            font-size: 32px; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.2); 
        }
        .subtitle { 
            text-align: center; 
            color: rgba(255,255,255,0.8); 
            margin-bottom: 30px; 
            font-size: 14px; 
        }

        /* Slideshow - Tema Ungu */
        .slideshow-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform: skewX(-2deg) rotate(1deg);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .slides { display: flex; transition: transform 0.5s ease; }
        .slide {
            min-width: 100%;
            aspect-ratio: 4 / 3;
            background: #2d1b4e;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .slide-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 14px;
            font-family: inherit;
        }
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(155,89,182,0.7);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        .prev:hover, .next:hover { 
            background: #9b59b6; 
            transform: translateY(-50%) scale(1.1); 
        }
        .prev { left: 10px; }
        .next { right: 10px; }
        .dots { text-align: center; margin-top: 15px; }
        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin: 0 5px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dot.active { background: white; transform: scale(1.2); }

        /* Gallery Grid - Tema Ungu */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .gallery-item {
            background: rgba(155,89,182,0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            aspect-ratio: 1 / 1;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .gallery-item:hover { 
            transform: translateY(-5px) scale(1.02); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-color: rgba(255,255,255,0.5);
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 8px;
            font-size: 10px;
            text-align: center;
            font-family: inherit;
        }

        /* Buttons - Tema Ungu */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .nav-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            background: white;
            color: #9b59b6;
        }
        .nav-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        /* Random Button - Ungu */
        .random-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }
        .random-btn:hover {
            background: linear-gradient(135deg, #ff4757, #e74c3c);
        }

        /* Lightbox - Tema Ungu */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox img { 
            max-width: 90%; 
            max-height: 80%; 
            border-radius: 10px;
            border: 3px solid #9b59b6;
        }
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .close-lightbox:hover {
            transform: scale(1.1);
            color: #9b59b6;
        }
        .lightbox-caption { 
            color: white; 
            margin-top: 15px; 
            font-size: 16px; 
            background: rgba(155,89,182,0.5);
            padding: 8px 20px;
            border-radius: 30px;
            font-family: inherit;
        }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            h1 { font-size: 24px; }
            .slideshow-container { max-width: 90%; }
            .loading-text { font-size: 20px; }
        }
        @media (max-width: 480px) {
            .button-container { gap: 10px; }
            .nav-btn { padding: 10px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">
            <span class="loading-letter">L</span><span class="loading-letter">I</span><span class="loading-letter">F</span><span class="loading-letter">X</span>
            <span class="loading-letter"> </span>
            <span class="loading-letter">L</span><span class="loading-letter">i</span><span class="loading-letter">b</span><span class="loading-letter">r</span><span class="loading-letter">a</span><span class="loading-letter">r</span><span class="loading-letter">y</span>
        </div>
        <div style="color:rgba(255,255,255,0.7); margin-top:15px;">Memuat Gallery...</div>
    </div>

    <div class="container" id="mainContent">
        <h1>🖼️ Gallery Kenangan LIFX</h1>
        <p class="subtitle">Momen - momen terbaik bersama LIFX Library</p>

        <!-- Slideshow -->
        <div class="slideshow-container">
            <button class="prev" id="prevBtn">❮</button>
            <div class="slides" id="slides"></div>
            <button class="next" id="nextBtn">❯</button>
        </div>
        <div class="dots" id="dots"></div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid"></div>

        <!-- Random Button -->
        <div style="text-align: center; margin: 20px 0;">
            <button class="nav-btn random-btn" id="randomBtn">🎲 RANDOM FOTO</button>
        </div>

        <!-- Navigation Buttons -->
        <div class="button-container">
            <button class="nav-btn dashboard" onclick="window.location.href='dashboard.html'">🏠 KEMBALI KE DASHBOARD</button>
            <button class="nav-btn login" onclick="window.location.href='index.html'">🔐 KEMBALI KE LOGIN</button>
        </div>

        <p style="text-align: center; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 30px;">© alifdiaz - LIFX Library Gallery</p>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <span class="close-lightbox" id="closeLightbox">✕</span>
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <script>
        // IndexedDB setup
        let db = null;
        const DB_NAME = 'LIFXLibraryDB';
        const DB_VERSION = 2;
        
        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const dbEvent = event.target.result;
                    if (!dbEvent.objectStoreNames.contains('gallery')) {
                        dbEvent.createObjectStore('gallery', { keyPath: 'id' });
                    }
                };
            });
        }
        
        async function getAllGalleryFromDB() {
            if (!db) await openDatabase();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['gallery'], 'readonly');
                const store = transaction.objectStore('gallery');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Hide loading screen
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('hide');
            setTimeout(() => loadingScreen.remove(), 600);
        }, 2000);

        let galleryData = [];
        let currentSlide = 0;
        let autoSlideInterval;

        // Render slideshow and gallery
        async function loadGallery() {
            await openDatabase();
            const stored = await getAllGalleryFromDB();
            if (stored && stored.length > 0) {
                galleryData = stored;
            } else {
                // Data default dengan placeholder ungu
                galleryData = [
                    { id: 1, title: 'Kenangan 1 - Bersama LIFX', imageData: null, timestamp: new Date().toISOString() },
                    { id: 2, title: 'Kenangan 2 - Saat Indah', imageData: null, timestamp: new Date().toISOString() },
                    { id: 3, title: 'Kenangan 3 - Semangat', imageData: null, timestamp: new Date().toISOString() },
                    { id: 4, title: 'Kenangan 4 - Momen Tak Terlupakan', imageData: null, timestamp: new Date().toISOString() },
                    { id: 5, title: 'Kenangan 5 - Kebersamaan', imageData: null, timestamp: new Date().toISOString() }
                ];
            }
            
            renderSlideshow();
            renderGallery();
            createDots();
            startAutoSlide();
        }
        
        function renderSlideshow() {
            const slidesContainer = document.getElementById('slides');
            slidesContainer.innerHTML = galleryData.map(item => `
                <div class="slide">
                    <img src="${item.imageData || 'https://placehold.co/600x400/9b59b6/white?text=' + encodeURIComponent(item.title)}" alt="${item.title}" onerror="this.src='https://placehold.co/600x400/9b59b6/white?text=Image+Not+Found'">
                    <div class="slide-caption">${escapeHtml(item.title)}</div>
                </div>
            `).join('');
            updateSlides();
        }
        
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = galleryData.map((item, index) => `
                <div class="gallery-item" data-index="${index}">
                    <img src="${item.imageData || 'https://placehold.co/300x300/9b59b6/white?text=' + encodeURIComponent(item.title)}" alt="${item.title}" onerror="this.src='https://placehold.co/300x300/9b59b6/white?text=No+Image'">
                    <div class="gallery-overlay">${escapeHtml(item.title)}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.gallery-item').forEach(item => {
                item.addEventListener('click', () => {
                    const idx = parseInt(item.dataset.index);
                    openLightbox(idx);
                });
            });
        }
        
        function updateSlides() {
            const slidesContainer = document.getElementById('slides');
            if (slidesContainer) {
                slidesContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
            }
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }
        
        function createDots() {
            const dotsContainer = document.getElementById('dots');
            dotsContainer.innerHTML = '';
            galleryData.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.classList.add('dot');
                if (i === currentSlide) dot.classList.add('active');
                dot.addEventListener('click', () => { 
                    currentSlide = i; 
                    updateSlides(); 
                    restartAutoSlide(); 
                });
                dotsContainer.appendChild(dot);
            });
        }
        
        function startAutoSlide() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                currentSlide = (currentSlide + 1) % galleryData.length;
                updateSlides();
            }, 4000);
        }
        
        function restartAutoSlide() {
            clearInterval(autoSlideInterval);
            startAutoSlide();
        }
        
        function openLightbox(index) {
            const item = galleryData[index];
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            const caption = document.getElementById('lightboxCaption');
            img.src = item.imageData || 'https://placehold.co/800x600/9b59b6/white?text=' + encodeURIComponent(item.title);
            caption.textContent = item.title;
            lightbox.classList.add('active');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
        
        // Event Listeners
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentSlide = (currentSlide - 1 + galleryData.length) % galleryData.length;
            updateSlides();
            restartAutoSlide();
        });
        
        document.getElementById('nextBtn').addEventListener('click', () => {
            currentSlide = (currentSlide + 1) % galleryData.length;
            updateSlides();
            restartAutoSlide();
        });
        
        document.getElementById('closeLightbox').addEventListener('click', () => {
            document.getElementById('lightbox').classList.remove('active');
        });
        
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightbox')) {
                document.getElementById('lightbox').classList.remove('active');
            }
        });
        
        document.getElementById('randomBtn').addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * galleryData.length);
            openLightbox(randomIndex);
        });
        
        // Pause auto slide on hover
        const slideshowContainer = document.querySelector('.slideshow-container');
        if (slideshowContainer) {
            slideshowContainer.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
            slideshowContainer.addEventListener('mouseleave', startAutoSlide);
        }
        
        // Initialize
        loadGallery();
    </script>
</body>
</html>
