<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Profil - LIFX Library</title>
    <style>
        /* ============ FONT DARI FOLDER FONTS ============ */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('assets/fonts/cartoon-bold.woff2') format('woff2'),
                 url('assets/fonts/cartoon-bold.woff') format('woff'),
                 url('assets/fonts/cartoon-bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Quicksand';
            src: url('assets/fonts/Quicksand-Bold.woff2') format('woff2'),
                 url('assets/fonts/Quicksand-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MyCustomFont', 'Quicksand', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive;
            font-weight: bold;
            min-height: 100vh;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Particles Background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Profile Card - Tema Ungu */
        .profile-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 35px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            position: relative;
            z-index: 2;
            border: 2px solid rgba(155,89,182,0.3);
            transition: all 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-color: rgba(155,89,182,0.8);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        /* Efek kilat putih halus */
        .profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
            transform: rotate(45deg);
            animation: whiteFlash 8s infinite;
            pointer-events: none;
            border-radius: 28px;
        }

        @keyframes whiteFlash {
            0% { transform: translateX(-100%) rotate(45deg); }
            20%, 100% { transform: translateX(100%) rotate(45deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            margin: 0 auto 15px;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .profile-name {
            font-size: 26px;
            margin-bottom: 8px;
            color: #4a2c7a;
            letter-spacing: 1px;
        }

        .profile-role {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 12px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .profile-role.user {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            box-shadow: 0 3px 10px rgba(155,89,182,0.3);
        }

        .info-item {
            background: rgba(245, 240, 255, 0.8);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 12px;
            text-align: left;
            transition: all 0.3s;
            border-left: 3px solid #9b59b6;
        }

        .info-item:hover {
            transform: translateX(5px);
            background: rgba(245, 240, 255, 1);
            border-left-color: #8e44ad;
        }

        .info-label {
            font-size: 11px;
            color: #7a5a9a;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: bold;
            color: #4a2c7a;
            word-break: break-word;
        }

        .back-btn {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .back-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .back-btn:hover::before {
            left: 100%;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(155,89,182,0.4);
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(155,89,182,0.3);
            border-top: 3px solid #9b59b6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .profile-card {
                padding: 25px;
                margin: 10px;
            }
            .profile-avatar {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
            .profile-name {
                font-size: 20px;
            }
            .info-value {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <div class="profile-card" id="profileCard">
        <div class="profile-avatar" id="profileAvatar">👤</div>
        <div class="profile-name" id="profileName">Loading...</div>
        <div class="profile-role" id="profileRole">Loading...</div>
        
        <div class="info-item">
            <div class="info-label">📝 Username</div>
            <div class="info-value" id="infoUsername">-</div>
        </div>
        <div class="info-item">
            <div class="info-label">⭐ Role / Level</div>
            <div class="info-value" id="infoRole">-</div>
        </div>
        <div class="info-item">
            <div class="info-label">📅 Bergabung Sejak</div>
            <div class="info-value" id="infoJoined">-</div>
        </div>
        <div class="info-item">
            <div class="info-label">📊 Total Rating Diberikan</div>
            <div class="info-value" id="totalRating">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">💬 Total Komentar</div>
            <div class="info-value" id="totalComments">0</div>
        </div>
        
        <button class="back-btn" onclick="window.location.href='dashboard.html'">← KEMBALI KE DASHBOARD</button>
    </div>

    <script>
        // ==================== PARTICLES ====================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = Math.random() * 6 + 3 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.background = 'rgba(200, 150, 255, ' + (Math.random() * 0.5 + 0.2) + ')';
                container.appendChild(p);
            }
        }
        createParticles();

        // ==================== GET USER DATA ====================
        const username = localStorage.getItem('lifx_user');
        const role = localStorage.getItem('lifx_role');
        
        // Jika guest, redirect ke dashboard
        if (!username || role === 'guest') {
            alert('👻 Guest tidak memiliki profil! Silakan login terlebih dahulu.');
            window.location.href = 'dashboard.html';
        }
        
        // Jika admin, redirect ke dashboard (admin disembunyikan)
        if (role === 'admin') {
            alert('👑 Halaman profil untuk admin disembunyikan. Silakan login sebagai user biasa.');
            window.location.href = 'dashboard.html';
        }
        
        // Ambil data akun
        const accounts = JSON.parse(localStorage.getItem('lifx_accounts') || '[]');
        const userAccount = accounts.find(a => a.username === username && a.role === 'user');
        
        // Ambil data rating dan komentar user
        const ratings = JSON.parse(localStorage.getItem('lifx_ratings') || '[]');
        const comments = JSON.parse(localStorage.getItem('lifx_comments') || '[]');
        
        const userRatings = ratings.filter(r => r.username === username);
        const userComments = comments.filter(c => c.username === username);
        
        const totalRatingGiven = userRatings.length;
        const totalUserComments = userComments.length;
        
        // Ambil avatar dari localStorage
        const savedAvatar = localStorage.getItem('lifx_avatar');
        
        // Update UI
        document.getElementById('profileName').innerText = username;
        document.getElementById('profileRole').innerText = 'User';
        document.getElementById('profileRole').className = 'profile-role user';
        document.getElementById('profileAvatar').innerHTML = savedAvatar || '👤';
        document.getElementById('infoRole').innerHTML = 'User (Akses Terbatas)';
        document.getElementById('infoUsername').innerHTML = username;
        document.getElementById('totalRating').innerHTML = totalRatingGiven;
        document.getElementById('totalComments').innerHTML = totalUserComments;
        
        // Format tanggal bergabung
        if (userAccount && userAccount.createdAt) {
            const date = new Date(userAccount.createdAt).toLocaleDateString('id-ID', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            document.getElementById('infoJoined').innerHTML = date;
        } else {
            document.getElementById('infoJoined').innerHTML = 'Belum tersedia';
        }
        
        // Efek tambahan: animasi fade in untuk card
        const card = document.querySelector('.profile-card');
        card.style.animation = 'fadeIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1)';
    </script>
</body>
</html>
