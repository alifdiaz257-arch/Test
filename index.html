<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LIFX Library - Masuk</title>
    <style>
        /* ============ FONT DARI FOLDER FONTS ============ */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('assets/fonts/cartoon-bold.woff2') format('woff2'),
                 url('assets/fonts/cartoon-bold.woff') format('woff'),
                 url('assets/fonts/cartoon-bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Quicksand';
            src: url('assets/fonts/Quicksand-Bold.woff2') format('woff2'),
                 url('assets/fonts/Quicksand-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MyCustomFont', 'Quicksand', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive;
            font-weight: bold;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
            background: #0d0d1a;
        }

        /* ============ VIDEO BACKGROUND ============ */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.6) saturate(0.8);
        }

        /* Overlay ungu elegan */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(75, 0, 130, 0.75), rgba(45, 0, 75, 0.85));
            z-index: -1;
        }

        /* ============ PARTICLES ============ */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(180, 130, 255, 0.4);
            border-radius: 50%;
            animation: floatUp linear infinite;
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.3);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* ============ LOADING BAR ============ */
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 9999;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8e44ad, #c39bd3, #8e44ad);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(142, 68, 173, 0.6);
        }

        /* ============ LOGIN CARD ============ */
        .login-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 460px;
            background: rgba(20, 15, 35, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(157, 106, 200, 0.4);
            border-radius: 32px;
            padding: 45px 38px;
            text-align: center;
            z-index: 2;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(157, 106, 200, 0.2);
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .login-card:hover {
            transform: translate(-50%, -50%) translateY(-5px);
            border-color: rgba(157, 106, 200, 0.7);
            box-shadow: 0 35px 70px rgba(0,0,0,0.5), 0 0 0 2px rgba(157, 106, 200, 0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, -35%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        @keyframes fadeOutDown {
            from {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -65%);
            }
        }

        .login-card {
            animation: fadeInUp 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        .login-card.fade-out {
            animation: fadeOutDown 0.45s ease forwards;
        }

        /* Efek kilat putih halus */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
            transform: rotate(45deg);
            animation: whiteFlash 8s infinite;
            pointer-events: none;
            border-radius: 32px;
        }

        @keyframes whiteFlash {
            0% { transform: translateX(-100%) rotate(45deg); }
            20%, 100% { transform: translateX(100%) rotate(45deg); }
        }

        .form_heading {
            font-size: 34px;
            color: #c39bd3;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(157, 106, 200, 0.4);
            font-family: inherit;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #a89bc2;
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: normal;
            letter-spacing: 0.5px;
        }

        .input {
            width: 100%;
            padding: 15px 20px;
            margin: 12px 0;
            border: 1.5px solid rgba(157, 106, 200, 0.3);
            border-radius: 20px;
            background: rgba(30, 20, 45, 0.8);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
            color: #e8d5f5;
        }

        .input:focus {
            outline: none;
            border-color: #c39bd3;
            box-shadow: 0 0 20px rgba(195, 155, 211, 0.3);
            background: rgba(30, 20, 45, 0.95);
        }

        .input::placeholder {
            color: #6a5a8a;
        }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            color: #c39bd3;
            margin-top: 5px;
            margin-bottom: 3px;
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        /* Tombol GUEST */
        .guest-button {
            width: 100%;
            padding: 16px;
            margin: 15px 0 12px 0;
            background: linear-gradient(135deg, #8e44ad, #6c3483);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(110, 50, 150, 0.3);
        }

        .guest-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .guest-button:hover::before {
            left: 100%;
        }

        .guest-button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #9b59b6, #7d3c98);
            box-shadow: 0 8px 25px rgba(110, 50, 150, 0.4);
        }

        .button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: linear-gradient(135deg, #8e44ad, #6c3483);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 3px 10px rgba(110, 50, 150, 0.2);
        }

        .button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #9b59b6, #7d3c98);
            box-shadow: 0 6px 15px rgba(110, 50, 150, 0.3);
        }

        .switch-mode-btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: transparent;
            border: 1.5px solid rgba(157, 106, 200, 0.5);
            color: #c39bd3;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
        }

        .switch-mode-btn:hover {
            background: rgba(157, 106, 200, 0.1);
            transform: translateY(-1px);
            border-color: #c39bd3;
            color: #e8d5f5;
        }

        .demo-info {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(157, 106, 200, 0.6);
            font-family: inherit;
            padding: 10px;
            background: rgba(157, 106, 200, 0.08);
            border-radius: 30px;
            letter-spacing: 0.5px;
        }

        /* ============ CHIBI DI BAWAH TOMBOL TAMU ============ */
        .chibi-container {
            margin-top: 20px;
            text-align: center;
            position: relative;
        }

        .chibi-image {
            display: inline-block;
            width: 70px;
            height: 70px;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }

        .chibi-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            background: transparent;
        }

        .chibi-image:hover {
            transform: scale(1.05) rotate(3deg);
            filter: drop-shadow(0 6px 15px rgba(110, 50, 150, 0.4));
        }

        /* Tooltip chibi */
        .chibi-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #8e44ad, #6c3483);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            pointer-events: none;
        }

        .chibi-tooltip::before {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #8e44ad transparent transparent transparent;
        }

        .chibi-image:hover .chibi-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-5px);
        }

        /* ============ ANIMASI CENTANG SUKSES ============ */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(16px);
            z-index: 10001;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn { 
            from { opacity: 0; backdrop-filter: blur(0px); } 
            to { opacity: 1; backdrop-filter: blur(16px); } 
        }

        @keyframes scaleUp { 
            0% { transform: scale(0); opacity: 0; } 
            60% { transform: scale(1.15); } 
            100% { transform: scale(1); opacity: 1; } 
        }

        @keyframes checkPop { 
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 
            80% { transform: translate(-50%, -50%) scale(1.25); } 
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 
        }

        .checkmark-circle {
            width: 90px;
            height: 90px;
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .checkmark-circle .checkmark-bg {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            position: absolute;
            animation: scaleUp 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
        }

        .checkmark-circle .checkmark-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: white;
            font-size: 55px;
            font-weight: bold;
            animation: checkPop 0.4s ease 0.3s forwards;
        }

        .success-message {
            color: white;
            font-size: 22px;
            font-weight: bold;
            margin-top: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .success-sub {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            margin-top: 8px;
        }

        /* ============ CUSTOM POPUP ============ */
        .custom-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 15, 35, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 106, 200, 0.5);
            border-radius: 32px;
            padding: 35px 40px;
            min-width: 320px;
            max-width: 90%;
            text-align: center;
            z-index: 10000;
            box-shadow: 0 0 50px rgba(110, 50, 150, 0.3), 0 20px 40px rgba(0,0,0,0.3);
            animation: slideInPopup 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes slideInPopup {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.94);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .custom-popup-icon { font-size: 60px; margin-bottom: 20px; }
        .custom-popup-message { font-size: 16px; margin-bottom: 25px; color: #c39bd3; line-height: 1.6; font-weight: normal; }
        .custom-popup-button {
            background: linear-gradient(135deg, #8e44ad, #6c3483);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .custom-popup-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(142, 68, 173, 0.4);
        }

        /* ============ FOOTER ============ */
        .footer-note {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: rgba(157, 106, 200, 0.4);
            z-index: 2;
            font-weight: normal;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .login-card { padding: 35px 28px; max-width: 94%; }
            .form_heading { font-size: 28px; }
            .guest-button { font-size: 17px; padding: 14px; }
            .button { padding: 12px; font-size: 15px; }
            .custom-popup { padding: 25px 30px; min-width: 280px; }
            .custom-popup-icon { font-size: 50px; }
            .checkmark-circle { width: 75px; height: 75px; }
            .checkmark-circle .checkmark-icon { font-size: 45px; }
            .success-message { font-size: 18px; }
            .chibi-image { width: 55px; height: 55px; }
        }

        @media (max-width: 380px) {
            .login-card { padding: 28px 20px; }
            .form_heading { font-size: 24px; }
            .subtitle { font-size: 12px; }
            .input { padding: 12px 15px; font-size: 14px; }
            .chibi-image { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <!-- LOADING BAR -->
    <div class="loading-container"><div class="loading-bar" id="loadingBar"></div></div>

    <!-- VIDEO BACKGROUND -->
    <video class="video-bg" autoplay loop muted playsinline id="bgVideo">
        <source src="assets/videos/background.mp4" type="video/mp4">
        <source src="assets/videos/background.webm" type="video/webm">
    </video>
    <div class="video-overlay"></div>

    <!-- PARTICLES -->
    <div class="particles" id="particles"></div>

    <!-- LOGIN CARD -->
    <div class="login-card" id="loginCard">
        <div class="form_heading">✦ LIFX Library ✦</div>
        <div class="subtitle">Perpustakaan Digital Premium</div>
        
        <!-- Guest Mode -->
        <div id="guestMode">
            <button class="guest-button" id="guestBtn">MASUK SEBAGAI TAMU</button>
            <button class="switch-mode-btn" id="switchToLoginBtn">📝 Masuk dengan Akun</button>
            
            <!-- CHIBI DI BAWAH TOMBOL TAMU -->
            <div class="chibi-container">
                <div class="chibi-image" id="chibiImage">
                    <img src="assets/images/chibi.png" alt="anime chibi" onerror="this.style.display='none'">
                    <div class="chibi-tooltip">✨ apaa!! ✨</div>
                </div>
            </div>
        </div>

        <!-- Login/Register Mode -->
        <div id="loginRegisterMode" style="display: none;">
            <label for="username">Username</label>
            <input type="text" id="username" class="input" placeholder="Masukkan username">
            
            <label for="password">Kata Sandi</label>
            <input type="password" id="password" class="input" placeholder="Masukkan kata sandi">
            
            <div id="confirmField" style="display: none;">
                <label for="confirmPassword">Konfirmasi Kata Sandi</label>
                <input type="password" id="confirmPassword" class="input" placeholder="Konfirmasi kata sandi">
            </div>
            
            <button class="button" id="actionBtn">MASUK</button>
            
            <button class="switch-mode-btn" id="switchToRegisterBtn">✨ Buat Akun Baru</button>
            <button class="switch-mode-btn" id="switchToLoginFromRegisterBtn" style="display: none;">⬅️ Kembali ke Login</button>
            <button class="switch-mode-btn" id="backToGuestBtn">🏠 Kembali sebagai Tamu</button>
            
            <div class="demo-info">
                🔐 Demo: member / member123
            </div>
        </div>
    </div>

    <div class="footer-note">
        © 2025 LIFX Library — Akses Tanpa Batas
    </div>

    <script>
        // ==================== CUSTOM ALERT ====================
        function customAlert(message, icon = 'ℹ️') {
            return new Promise((resolve) => {
                const existing = document.querySelector('.custom-popup');
                if (existing) existing.remove();
                const popup = document.createElement('div');
                popup.className = 'custom-popup';
                popup.innerHTML = `
                    <div class="custom-popup-icon">${icon}</div>
                    <div class="custom-popup-message">${message}</div>
                    <div class="custom-popup-buttons">
                        <button class="custom-popup-button" id="popupOkBtn">OK</button>
                    </div>
                `;
                document.body.appendChild(popup);
                document.getElementById('popupOkBtn').onclick = () => { popup.remove(); resolve(); };
                document.addEventListener('keypress', function handler(e) {
                    if (e.key === 'Enter') { popup.remove(); document.removeEventListener('keypress', handler); resolve(); }
                });
            });
        }
        window.alert = customAlert;

        // ==================== LOADING BAR ====================
        let progress = 0;
        const bar = document.getElementById('loadingBar');
        let loadInterval;
        
        function startLoading() {
            progress = 0;
            bar.style.width = '0%';
            loadInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 12;
                    if (progress > 90) progress = 90;
                    bar.style.width = progress + '%';
                }
            }, 100);
        }
        
        function finishLoading() {
            clearInterval(loadInterval);
            progress = 100;
            bar.style.width = '100%';
            setTimeout(() => { bar.style.width = '0%'; }, 500);
        }
        
        startLoading();
        window.addEventListener('load', () => { finishLoading(); });

        // ==================== PARTICLES ====================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 100; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = Math.random() * 6 + 4 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.background = 'rgba(180, 130, 255, ' + (Math.random() * 0.5 + 0.2) + ')';
                p.style.boxShadow = '0 0 10px rgba(157, 106, 200, 0.3)';
                container.appendChild(p);
            }
        }
        createParticles();

        // ==================== ANIMASI SUKSES ====================
        function showSuccessAnimation(username, role) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'success-overlay';
                overlay.innerHTML = `
                    <div class="checkmark-circle">
                        <div class="checkmark-bg"></div>
                        <div class="checkmark-icon">✓</div>
                    </div>
                    <div class="success-message">Selamat Datang ✨</div>
                    <div class="success-sub">${username}</div>
                    <div class="success-sub" style="font-size: 13px; margin-top: 5px;">${role === 'admin' ? 'Mode Administrator' : 'Akses Member'}</div>
                `;
                document.body.appendChild(overlay);
                
                setTimeout(() => {
                    overlay.style.animation = 'fadeOut 0.4s ease forwards';
                    setTimeout(() => { overlay.remove(); resolve(); }, 400);
                }, 1800);
            });
        }

        function showErrorAnimation() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'success-overlay';
                overlay.innerHTML = `
                    <div class="checkmark-circle">
                        <div class="checkmark-bg" style="background: linear-gradient(135deg, #e74c3c, #c0392b); box-shadow: 0 0 30px rgba(231,76,60,0.5);"></div>
                        <div class="checkmark-icon" style="font-size: 60px;">✗</div>
                    </div>
                    <div class="success-message">Akses Ditolak</div>
                    <div class="success-sub">Username atau kata sandi salah</div>
                    <div class="success-sub" style="font-size: 12px; margin-top: 5px;">Silakan coba lagi</div>
                `;
                document.body.appendChild(overlay);
                
                setTimeout(() => {
                    overlay.style.animation = 'fadeOut 0.4s ease forwards';
                    setTimeout(() => { overlay.remove(); resolve(); }, 400);
                }, 1800);
            });
        }

        function showSuccessRegisterAnimation(username) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'success-overlay';
                overlay.innerHTML = `
                    <div class="checkmark-circle">
                        <div class="checkmark-bg" style="background: linear-gradient(135deg, #8e44ad, #6c3483);"></div>
                        <div class="checkmark-icon">✓</div>
                    </div>
                    <div class="success-message">Pendaftaran Berhasil</div>
                    <div class="success-sub">Akun ${username} telah dibuat</div>
                    <div class="success-sub" style="font-size: 12px;">Silakan masuk dengan akun Anda</div>
                `;
                document.body.appendChild(overlay);
                
                setTimeout(() => {
                    overlay.style.animation = 'fadeOut 0.4s ease forwards';
                    setTimeout(() => { overlay.remove(); resolve(); }, 400);
                }, 2000);
            });
        }

        function fadeCardAndRedirect(url) {
            const card = document.getElementById('loginCard');
            card.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = url;
            }, 450);
        }

        // ==================== ACCOUNT SYSTEM ====================
        let accounts = [];
        
        function loadAccounts() {
            const stored = localStorage.getItem('lifx_accounts');
            if (stored) {
                accounts = JSON.parse(stored);
            } else {
                accounts = [
                    { username: 'admin', password: 'admin123', role: 'admin', createdAt: new Date().toISOString(), avatar: '👑' },
                    { username: 'member', password: 'member123', role: 'user', createdAt: new Date().toISOString(), avatar: '👤' }
                ];
                saveAccounts();
            }
        }
        
        function saveAccounts() {
            localStorage.setItem('lifx_accounts', JSON.stringify(accounts));
        }
        
        function registerAccount(username, password) {
            if (accounts.find(a => a.username === username)) return false;
            accounts.push({ 
                username, 
                password, 
                role: 'user', 
                createdAt: new Date().toISOString(),
                avatar: '👤'
            });
            saveAccounts();
            return true;
        }
        
        function loginAccount(username, password) {
            const acc = accounts.find(a => a.username === username && a.password === password);
            if (acc) {
                localStorage.setItem('lifx_user', acc.username);
                localStorage.setItem('lifx_role', acc.role);
                localStorage.setItem('lifx_avatar', acc.avatar || (acc.role === 'admin' ? '👑' : '👤'));
                return true;
            }
            return false;
        }
        
        function guestLogin() {
            localStorage.setItem('lifx_user', 'Guest');
            localStorage.setItem('lifx_role', 'guest');
            localStorage.setItem('lifx_avatar', '👻');
            return true;
        }

        // ==================== UI MODE ====================
        let isLoginMode = true;
        
        function showGuestMode() {
            document.getElementById('guestMode').style.display = 'block';
            document.getElementById('loginRegisterMode').style.display = 'none';
            document.getElementById('confirmField').style.display = 'none';
        }
        
        function showLoginRegisterMode() {
            document.getElementById('guestMode').style.display = 'none';
            document.getElementById('loginRegisterMode').style.display = 'block';
            document.getElementById('confirmField').style.display = 'none';
            document.getElementById('actionBtn').innerText = 'MASUK';
            document.getElementById('switchToRegisterBtn').style.display = 'block';
            document.getElementById('switchToLoginFromRegisterBtn').style.display = 'none';
            isLoginMode = true;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('confirmPassword').value = '';
        }
        
        function showRegisterMode() {
            document.getElementById('confirmField').style.display = 'block';
            document.getElementById('actionBtn').innerText = 'DAFTAR';
            document.getElementById('switchToRegisterBtn').style.display = 'none';
            document.getElementById('switchToLoginFromRegisterBtn').style.display = 'block';
            isLoginMode = false;
            document.getElementById('confirmPassword').value = '';
        }
        
        function showLoginMode() {
            document.getElementById('confirmField').style.display = 'none';
            document.getElementById('actionBtn').innerText = 'MASUK';
            document.getElementById('switchToRegisterBtn').style.display = 'block';
            document.getElementById('switchToLoginFromRegisterBtn').style.display = 'none';
            isLoginMode = true;
        }
        
        async function handleAction() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                await showErrorAnimation();
                return;
            }
            
            if (isLoginMode) {
                if (loginAccount(username, password)) {
                    const role = localStorage.getItem('lifx_role');
                    await showSuccessAnimation(username, role);
                    fadeCardAndRedirect('dashboard.html');
                } else {
                    await showErrorAnimation();
                }
            } else {
                const confirm = document.getElementById('confirmPassword').value;
                if (password !== confirm) {
                    await showErrorAnimation();
                    return;
                }
                if (password.length < 4) {
                    await customAlert('Kata sandi minimal 4 karakter!', '⚠️');
                    return;
                }
                if (registerAccount(username, password)) {
                    await showSuccessRegisterAnimation(username);
                    showLoginMode();
                    document.getElementById('username').value = username;
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                    await customAlert(`✅ Akun "${username}" berhasil dibuat! Silakan masuk.`, '✅');
                } else {
                    await customAlert('❌ Username sudah digunakan!', '❌');
                }
            }
        }
        
        async function handleGuest() {
            guestLogin();
            await showSuccessAnimation('Guest', 'guest');
            fadeCardAndRedirect('dashboard.html');
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('guestBtn').onclick = handleGuest;
        document.getElementById('switchToLoginBtn').onclick = showLoginRegisterMode;
        document.getElementById('backToGuestBtn').onclick = showGuestMode;
        document.getElementById('switchToRegisterBtn').onclick = showRegisterMode;
        document.getElementById('switchToLoginFromRegisterBtn').onclick = showLoginMode;
        document.getElementById('actionBtn').onclick = handleAction;
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAction();
        });
        document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAction();
        });
        
        // Shake effect untuk error
        function shakeCard() {
            const card = document.getElementById('loginCard');
            card.style.animation = 'shake 0.3s ease-in-out';
            setTimeout(() => { card.style.animation = ''; }, 300);
        }
        
        // Tambahkan style shake
        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
        `;
        document.head.appendChild(shakeStyle);

        loadAccounts();
    </script>
</body>
</html>
